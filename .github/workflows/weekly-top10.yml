name: Weekly Top 10 Summary

on:
  schedule:
    - cron: '30 8 * * 0'

  workflow_dispatch:

jobs:
  generate-weekly-top10:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Weekly Top 10 summary
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/generate-weekly-top10.mjs

      - name: Report status
        if: always()
        run: |
          echo "📅 Weekly Top 10 generation completed at $(date -u)"
