name: Scheduled Broadcasts

on:
  # Manual trigger only.
  # Scheduled broadcast generation is handled inside daily-content.yml
  # right after article generation to keep data perfectly synchronized.
  workflow_dispatch:

concurrency:
  group: broadcast-generator
  cancel-in-progress: false

jobs:
  generate-broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate broadcast
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "📻 Generating scheduled broadcast..."
          node scripts/generate-broadcast.mjs

      - name: Upload latest broadcast to YouTube
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://the-daily-roast-66e.pages.dev' }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PRIVACY_STATUS: ${{ vars.YT_PRIVACY_STATUS || secrets.YT_PRIVACY_STATUS || 'public' }}
        run: |
          echo "🎬 Rendering MP4 and uploading to YouTube..."
          node scripts/upload-latest-broadcast-youtube.mjs

      - name: Report status
        if: always()
        run: |
          echo "📅 Broadcast run completed at $(date -u)"
          echo "📻 Scheduled broadcast workflow finished"
