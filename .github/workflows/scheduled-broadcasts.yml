name: Scheduled Broadcasts

on:
  # Run 3x daily at Tallinn slots: 09:00, 15:00, 21:00.
  # Cron is UTC, so include both seasonal UTC variants and gate in-job.
  # One row family is always "off-season" and will be skipped quickly by slot-check.
  # Minute 30 rows are safety-net retries in case GitHub misses the minute-0 trigger.
  schedule:
    - cron: '0 6,12,18 * * *'
    - cron: '0 7,13,19 * * *'
    - cron: '30 6,12,18 * * *'
    - cron: '30 7,13,19 * * *'

  workflow_dispatch:
    inputs:
      broadcast_slot:
        description: 'Manual slot override (auto uses current Tallinn time)'
        required: false
        type: choice
        default: auto
        options:
          - auto
          - morning
          - afternoon
          - evening
      replace_existing:
        description: 'Delete existing same-day edition before generating (manual runs only)'
        required: false
        type: boolean
        default: false

concurrency:
  group: broadcast-generator
  cancel-in-progress: false

jobs:
  slot-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      broadcast_slot: ${{ steps.check.outputs.broadcast_slot }}

    steps:
      - name: Check Tallinn broadcast slot
        id: check
        run: |
          tallinn_hh="$(TZ=Europe/Tallinn date +%H)"
          tallinn_hhmm="$(TZ=Europe/Tallinn date +%H:%M)"
          tallinn_dow="$(TZ=Europe/Tallinn date +%u)"
          tallinn_offset="$(TZ=Europe/Tallinn date +%z)"
          triggered_cron="${{ github.event.schedule || '' }}"
          input_slot="${{ github.event.inputs.broadcast_slot || 'auto' }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$input_slot" = "morning" ] || [ "$input_slot" = "afternoon" ] || [ "$input_slot" = "evening" ]; then
              slot="$input_slot"
            elif [ "$tallinn_hh" -lt 12 ]; then
              slot="morning"
            elif [ "$tallinn_hh" -lt 18 ]; then
              slot="afternoon"
            else
              slot="evening"
            fi

            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "broadcast_slot=$slot" >> "$GITHUB_OUTPUT"
            echo "🧪 Manual run: slot gate bypassed, slot=$slot (current: $tallinn_hhmm)"
            exit 0
          fi

          # Sunday is reserved for the dedicated marathon workflow.
          # Skip scheduled daily slots entirely on Sunday (Tallinn time).
          if [ "$tallinn_dow" = "7" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "broadcast_slot=" >> "$GITHUB_OUTPUT"
            echo "⏭️ Sunday detected in Tallinn ($tallinn_hhmm); skipping daily scheduled broadcast workflow"
            exit 0
          fi

          # Seasonal guard: only one cron family is valid for current Tallinn offset.
          # +0200 (winter): use * 7,13,19 UTC family
          # +0300 (summer): use * 6,12,18 UTC family
          if [ "$tallinn_offset" = "+0200" ] && [[ "$triggered_cron" == *"6,12,18"* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "broadcast_slot=" >> "$GITHUB_OUTPUT"
            echo "⏭️ Off-season cron trigger ($triggered_cron, offset $tallinn_offset) at $tallinn_hhmm, skipping broadcast"
            exit 0
          fi

          if [ "$tallinn_offset" = "+0300" ] && [[ "$triggered_cron" == *"7,13,19"* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "broadcast_slot=" >> "$GITHUB_OUTPUT"
            echo "⏭️ Off-season cron trigger ($triggered_cron, offset $tallinn_offset) at $tallinn_hhmm, skipping broadcast"
            exit 0
          fi

          if [ "$tallinn_hh" = "09" ]; then
            slot="morning"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "broadcast_slot=$slot" >> "$GITHUB_OUTPUT"
            echo "✅ Tallinn broadcast slot matched: $slot ($tallinn_hhmm)"
          elif [ "$tallinn_hh" = "15" ]; then
            slot="afternoon"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "broadcast_slot=$slot" >> "$GITHUB_OUTPUT"
            echo "✅ Tallinn broadcast slot matched: $slot ($tallinn_hhmm)"
          elif [ "$tallinn_hh" = "21" ]; then
            slot="evening"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "broadcast_slot=$slot" >> "$GITHUB_OUTPUT"
            echo "✅ Tallinn broadcast slot matched: $slot ($tallinn_hhmm)"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "broadcast_slot=" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tallinn broadcast slot not matched ($tallinn_hhmm), skipping broadcast"
          fi

  generate-broadcast:
    needs: slot-check
    if: needs.slot-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate broadcast
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BROADCAST_SLOT: ${{ needs.slot-check.outputs.broadcast_slot }}
          ENFORCE_TALLINN_SLOT_TIME: ${{ github.event_name == 'schedule' && '1' || '0' }}
          FORCE_REPLACE_EDITION: ${{ (inputs.replace_existing == true || github.event.inputs.replace_existing == 'true') && '1' || '0' }}
          BGM_VOLUME: ${{ vars.BGM_VOLUME || '0.10' }}
          BGM_TRACKS_JSON: ${{ vars.BGM_TRACKS_JSON || secrets.BGM_TRACKS_JSON || '' }}
          BGM_TRACK_UPBEAT: ${{ vars.BGM_TRACK_UPBEAT || '' }}
          BGM_TRACK_CHILL: ${{ vars.BGM_TRACK_CHILL || '' }}
          BGM_TRACK_FUNKY: ${{ vars.BGM_TRACK_FUNKY || '' }}
          BGM_TRACK_DRAMATIC: ${{ vars.BGM_TRACK_DRAMATIC || '' }}
          PLATFORM_PROMO_BRIEF: ${{ secrets.PLATFORM_PROMO_BRIEF || vars.PLATFORM_PROMO_BRIEF || '' }}
          HOST_BIO_JOE: ${{ secrets.HOST_BIO_JOE || vars.HOST_BIO_JOE || '' }}
          HOST_BIO_JANE: ${{ secrets.HOST_BIO_JANE || vars.HOST_BIO_JANE || '' }}
          HOST_SHARED_HISTORY: ${{ secrets.HOST_SHARED_HISTORY || vars.HOST_SHARED_HISTORY || '' }}
          HOST_MEMORY_BANK: ${{ secrets.HOST_MEMORY_BANK || vars.HOST_MEMORY_BANK || '' }}
          TANGENT_STYLE_GUIDE: ${{ secrets.TANGENT_STYLE_GUIDE || vars.TANGENT_STYLE_GUIDE || '' }}
          TARGET_TANGENTS_PER_EPISODE: ${{ secrets.TARGET_TANGENTS_PER_EPISODE || vars.TARGET_TANGENTS_PER_EPISODE || '3' }}
          MEMORY_LOOKBACK_DAYS: ${{ secrets.MEMORY_LOOKBACK_DAYS || vars.MEMORY_LOOKBACK_DAYS || '14' }}
          MEMORY_MAX_LINKS: ${{ secrets.MEMORY_MAX_LINKS || vars.MEMORY_MAX_LINKS || '8' }}
          ENABLE_EXTERNAL_RESEARCH: ${{ vars.ENABLE_EXTERNAL_RESEARCH || '' }}
          PROMO_BUMPER_TRACK: ${{ vars.PROMO_BUMPER_TRACK || '' }}
          PROMO_BUMPER_TRACK_MORNING: ${{ vars.PROMO_BUMPER_TRACK_MORNING || '' }}
          PROMO_BUMPER_TRACK_AFTERNOON: ${{ vars.PROMO_BUMPER_TRACK_AFTERNOON || '' }}
          PROMO_BUMPER_TRACK_EVENING: ${{ vars.PROMO_BUMPER_TRACK_EVENING || '' }}
          PROMO_BUMPER_SECONDS: ${{ vars.PROMO_BUMPER_SECONDS || '1.0' }}
          PROMO_PAUSE_SECONDS: ${{ vars.PROMO_PAUSE_SECONDS || '0.8' }}
        run: |
          echo "📻 Generating scheduled broadcast..."
          echo "🕒 Slot: $BROADCAST_SLOT"
          echo "♻️ Replace existing mode: $FORCE_REPLACE_EDITION"
          node scripts/generate-broadcast.mjs

      - name: Upload latest broadcast to YouTube
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://the-daily-roast-66e.pages.dev' }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PRIVACY_STATUS: ${{ vars.YT_PRIVACY_STATUS || secrets.YT_PRIVACY_STATUS || 'public' }}
          YT_PODCAST_PLAYLIST_ID: ${{ vars.YT_PODCAST_PLAYLIST_ID || secrets.YT_PODCAST_PLAYLIST_ID || '' }}
        run: |
          echo "🎬 Rendering MP4 and uploading to YouTube..."
          node scripts/upload-latest-broadcast-youtube.mjs

      - name: Report status
        if: always()
        run: |
          echo "📅 Broadcast run completed at $(date -u)"
          echo "📻 Scheduled broadcast workflow finished"
